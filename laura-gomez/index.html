        }
        
        .navbar {

        .nav-container {

            color: #2D6A4F;

        }

            font-size: 1.1rem;

        .specialties {

        .specialty-badge {

            position: relative;
            overflow: hidden;
        }

            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #2D6A4F, #52B788);

            margin-bottom: 1.5rem;

            color: #2D6A4F;

            border-color: #52B788;
            box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #2D6A4F 0%, #52B788 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(82, 183, 136, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .location-info {
            background: white;
            padding: 2rem;
            border-radius: 15px;

            align-items: center;

            height: 24px;
            margin-right: 1rem;
            color: #2D6A4F;
        }
        
        .map-container {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }
        
        .map-container iframe {
            width: 100%;
            height: 300px;
            border: none;
        }
        
        .footer {
            background: #2D6A4F;
            color: white;
            padding: 3rem 0;
            text-align: center;
        }

            gap: 2rem;
            margin-bottom: 2rem;

            color: #52B788;

            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
            z-index: 1000;
            transition: all 0.3s ease;
            text-decoration: none;
        }

            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(37, 211, 102, 0.4);
        }

            }

                font-size: 1.5rem;
            }
            
            .services-grid {
                grid-template-columns: 1fr;
            }
            
            .form-container {
                padding: 2rem 1rem;
            }
            
            .specialties {
                gap: 0.5rem;
            }
            
            .specialty-badge {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }
